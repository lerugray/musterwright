<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Musterwright — OOB editor</title>
  <script>
    (function () {
      var k = 'musterwright-theme';
      var s = localStorage.getItem(k);
      var dark = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (!dark) document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <link rel="stylesheet" href="src/style.css" />
  <!-- milsymbol v3.0.4 (MIT, vendored) — must load before the module entry -->
  <script src="src/vendor/milsymbol.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>Musterwright</h1>
      <span class="tagline">Order-of-battle editor</span>
    </div>
    <div class="project-bar">
      <span id="project-name" class="project-name">untitled</span>
      <span id="autosave-status" class="autosave-status">—</span>
    </div>
    <div class="actions">
      <button id="theme-toggle" type="button" aria-label="Toggle light/dark theme">Light</button>
      <button id="new-blank" type="button">New blank</button>
      <button id="open-gota" type="button">Open GotA source</button>
      <div class="export-group">
        <button id="export-oob" type="button">Export oob.json</button>
        <button id="export-assets" type="button">Export assets.json</button>
        <button id="export-pools" type="button">Export sp_pools.json</button>
        <button id="export-all" type="button" class="primary">Export all</button>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="roster" class="active" type="button">Roster</button>
    <button data-tab="assets" type="button">Assets</button>
    <button data-tab="pools" type="button">SP Pools</button>
    <button data-tab="validation" type="button">Validation</button>
    <button data-tab="counters" type="button">Counters</button>
  </nav>

  <main class="tab-content">
    <section data-pane="roster" id="roster-pane">
      <h2>Roster</h2>
      <div id="roster-container" class="table-container"></div>
    </section>
    <section data-pane="assets" id="assets-pane" hidden>
      <h2>Assets</h2>
      <div id="assets-container" class="table-container"></div>
    </section>
    <section data-pane="pools" id="pools-pane" hidden>
      <h2>SP Pools</h2>
      <div id="pools-container" class="table-container"></div>
    </section>
    <section data-pane="validation" id="validation-pane" hidden>
      <h2>Validation</h2>
      <div id="validation-container" class="validation-container"></div>
    </section>
    <section data-pane="counters" id="counters-pane" hidden>
      <h2>Counters</h2>
      <div id="counters-container" class="counters-container"></div>
    </section>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
